<script>
    const articlesData = {
        1: { title: "Как выбрать профессию, которая вам подходит", content: "<p>Выбор профессии — одно из самых важных решений в жизни. От него зависит не только финансовое благополучие, но и психологический комфорт, ощущение самореализации. К сожалению, многие выпускники школ подходят к этому вопросу поверхностно: ориентируются на советы родителей, «модные» специальности или выбирают вуз по принципу «лишь бы поступить». В итоге через пару лет учёбы или работы приходит разочарование.</p><p>Как же выбрать профессию осознанно? Первый шаг — честный самоанализ. Психологи рекомендуют выделить три ключевых аспекта: «хочу», «могу» и «надо». «Хочу» — это ваши интересы и склонности. Что вам действительно нравится делать? Решать логические задачи, общаться с людьми, работать руками, создавать что-то новое? «Могу» — ваши способности и склонности. Если вы гуманитарий, то вряд ли будете счастливы в профессии, требующей высшей математики, даже если она хорошо оплачивается. «Надо» — востребованность профессии на рынке труда. Стоит изучить прогнозы аналитиков: какие специальности будут актуальны через 5–10 лет.</p><p>Второй шаг — профориентационные тесты. Они не дадут готового ответа «иди в программисты», но помогут сузить круг поиска. На нашем сайте вы можете пройти тесты Климова (определяет тип профессии по предмету труда) и Голланда (выявляет профессиональную личность). После тестов стоит изучить список профессий, подходящих вашему типу, и прочитать описания — что конкретно делают эти специалисты.</p><p>Третий шаг — проверка гипотез. Выберите 2–3 профессии, которые вас заинтересовали, и попробуйте «примерить» их на себя: посмотрите интервью с профессионалами, запишитесь на онлайн-курсы (многие платформы дают бесплатные вводные модули), сходите на день открытых дверей в профильный вуз или техникум. Если есть возможность — попросите о карьерной консультации или устройтесь на стажировку/летнюю практику. Чем больше реального опыта вы получите до поступления, тем меньше риск ошибиться. Помните: выбор профессии — это не пожизненный приговор. Современный рынок труда гибок, многие люди меняют специальность раз в 5–7 лет. Главное — научиться учиться и не бояться перемен.</p>" },
        2: { title: "Самые востребованные профессии 2025–2030", content: "<p>Рынок труда стремительно меняется под влиянием цифровизации, автоматизации и новых технологий. Профессии, которые были популярны 10 лет назад, теряют актуальность, а на смену им приходят совершенно новые специальности. Какие же направления будут наиболее востребованы в ближайшие 5–7 лет? Аналитики выделяют несколько ключевых сфер.</p><p><strong>IT и искусственный интеллект.</strong> Здесь лидируют разработчики AI-моделей, инженеры по машинному обучению, Data Scientist (специалисты по анализу больших данных). Кроме того, растёт спрос на кибербезопасников — с каждым годом цифровые угрозы становятся сложнее. В этой сфере востребованы также DevOps-инженеры, которые автоматизируют процессы разработки и развёртывания приложений.</p><p><strong>Биотехнологии и медицина.</strong> Пандемия показала уязвимость систем здравоохранения, поэтому инвестиции в биомедицину выросли многократно. Биоинформатики (специалисты на стыке биологии и ИТ), генетические консультанты, разработчики персонализированных лекарств будут нужны всегда. В классической медицине останутся востребованными врачи-гериатры (работа с пожилыми), психотерапевты и реабилитологи.</p><p><strong>Экология и зелёная энергетика.</strong> Переход к устойчивому развитию создаёт спрос на экологов-аудиторов, специалистов по переработке отходов, инженеров в области возобновляемой энергии (ветер, солнце, водород). Уже сейчас во многих компаниях появляются должности ESG-менеджеров (ответственных за экологическую, социальную и управленческую повестку).</p><p><strong>Креативные индустрии и образование.</strong> Человеческий фактор сложно автоматизировать. UX/UI-дизайнеры, продюсеры контента, гейм-дизайнеры, специалисты по разработке образовательных программ (edtech) будут востребованы всегда. Особняком стоят профессии, связанные с психологией: лайф-коучи, корпоративные психологи, медиаторы — люди всё больше нуждаются в помощи с эмоциональным выгоранием и коммуникацией. Выбирая будущую специальность, обращайте внимание не только на зарплату сегодня, но и на тренды. Помните, что комбинация двух смежных областей (например, «IT + медицина» или «биология + программирование») даст вам больше возможностей, чем узкая классическая профессия.</p>" },
        3: { title: "Как подготовиться к ЕГЭ за год", content: "<p>Год до ЕГЭ — достаточный срок, чтобы системно подготовиться и сдать экзамены на высокие баллы. Однако многие впадают в панику или, наоборот, откладывают подготовку на последние месяцы. В этой статье — пошаговый план эффективной подготовки, который поможет вам избежать типичных ошибок.</p><p><strong>Шаг 1: Диагностика и цель.</strong> В начале года напишите пробный вариант по каждому предмету, который планируете сдавать. Узнайте свой реальный уровень. Затем определите желаемый балл (узнайте проходные баллы в интересующие вузы). Цель должна быть амбициозной, но реальной: если сейчас вы решаете на 50 баллов, то прыжок до 90 за год возможен только при интенсивных занятиях (6–8 часов в день). Поставьте промежуточные рубежи на каждую четверть.</p><p><strong>Шаг 2: План и расписание.</strong> Распределите время по темам. Начните с самых сложных разделов — их нужно повторять чаще. Составьте недельное расписание, где будут заложены 3–4 часа в день на подготовку в будни и 5–6 часов в выходные. Обязательно оставляйте время на отдых и спорт — без этого мозг перегружается, эффективность падает. Используйте технику Pomodoro (25 минут работы, 5 минут отдыха).</p><p><strong>Шаг 3: Ресурсы и методы.</strong> Не распыляйтесь на десятки учебников. Выберите 1–2 проверенных пособия (например, ФИПИ, авторы Сенина, Дощинский и др.) и онлайн-сервисы для тестирования («Решу ЕГЭ», «Незнайка»). Главный метод — решение вариантов полностью. После каждого варианта разбирайте каждую ошибку: выписывайте правило, перерешивайте задание. Полезно вести «дневник ошибок». Для запоминания объёмной информации (история, биология) используйте карточки (Anki или бумажные), ментальные карты, ассоциации.</p><p><strong>Шаг 4: Психологическая подготовка.</strong> Стресс — главный враг выпускника. Научитесь техникам дыхания (квадратное дыхание: вдох — пауза — выдох — пауза). За месяц до экзаменов поспите не менее 8 часов, наладьте питание. На самом ЕГЭ главное — не паниковать. Если забыли формулу — переходите к следующему заданию, потом вернётесь. Помните: даже если вы не доберёте 10 баллов до мечты, всегда есть альтернативные пути — платное отделение, пересдача через год, родственный вуз. Год подготовки — это марафон, а не спринт. Не сдавайтесь после первых неудачных пробников. Системные занятия и вера в себя обязательно приведут к результату.</p>" },
        4: { title: "Ошибки при выборе вуза и как их избежать", content: "<p>Каждый год тысячи абитуриентов делают ошибки при выборе университета, о которых жалеют уже на первом курсе. Самые распространённые заблуждения — «главное, чтобы вуз был престижным», «лишь бы поступить на бюджет, а специальность не важно», «все программы одинаковые». Давайте разберём эти и другие ошибки, а также способы их избежать.</p><p><strong>Ошибка 1: Ориентация только на название вуза.</strong> МГУ, ВШЭ, СПбГУ — это отличные бренды, но не внутри каждой специальности там сильное преподавание. Изучайте рейтинги конкретных направлений (например, предметные рейтинги RAEX или «Интерфакса»), читайте отзывы студентов и выпускников на профильных форумах (например, «Типичный абитуриент» во ВКонтакте). Возможно, в менее известном региональном вузе на вашу специальность преподают практики с реального производства, а в топовом — одни теоретики.</p><p><strong>Ошибка 2: Выбор вуза «за компанию».</strong> Ваши друзья или родители могут уговаривать пойти туда же, «чтобы не одному». Но учиться и работать вам. Если вас не вдохновляет специальность, шансы бросить вуз или работать не по профессии очень высоки. Постарайтесь настоять на своём выборе, предложите компромисс: вы можете подать документы в несколько мест, но приоритет — тот, который интересен вам.</p><p><strong>Ошибка 3: Не учёт местоположения и быта.</strong> Выбрали вуз в другом городе, но не подумали об общежитии, транспортной доступности, климате, стоимости жизни. В итоге студент тратит 3 часа на дорогу или живёт в ужасных условиях, и это убивает желание учиться. Перед поступлением съездите в город, посмотрите общежитие, пообщайтесь со студентами. Уточните, есть ли отсрочка от армии, стипендия, возможности подработки.</p><p><strong>Ошибка 4: Игнорирование карьерных перспектив.</strong> Поинтересуйтесь, есть ли у вуза договоры с предприятиями, практика с возможным трудоустройством, стажировки за рубежом. Посмотрите в LinkedIn или HH.ru, где работают выпускники этой программы. Если через 3–4 года после выпуска половина из них не работает по специальности — это тревожный сигнал. Выбирайте вуз, который помогает строить карьеру, а не просто даёт диплом. Помните, что качественное образование — это инвестиция в себя. Не бойтесь потратить лишний месяц на сбор информации. Ваше будущее стоит того.</p>" },
        5: { title: "Интервью с выпускником: от школы до работы мечты", content: "<p><strong>— Расскажи немного о себе: куда ты поступил после школы, что изучал и кем работаешь сейчас?</strong></p><p>Меня зовут Алексей, мне 27 лет. После школы я поступил в МАИ на специальность «Проектирование авиационных двигателей». Откровенно говоря, выбрал вуз по совету отца — он инженер. Первый курс я с трудом тянул: мне не нравилось черчение, сопромат, я чувствовал себя чужим. После второго курса я взял академотпуск и полгода работал курьером, параллельно проходил онлайн-курсы по Python. Понял, что хочу в IT. Перевёлся на «Прикладную информатику» в ТвГУ (региональный вуз, но там был сильный преподаватель по базам данных).</p><p><strong>— Что было самым сложным при смене направления?</strong></p><p>Страх потерять два года учёбы и разочаровать родителей. Но я подготовил презентацию с прогнозом зарплат в IT и доказал, что смогу отбить «потерянное» время за первую же работу. Пересдавал математику и информатику, догонял одногруппников. Первые месяцы было тяжело — я засиживался до ночи, но помогали проекты на GitHub и стажировка в местной веб-студии.</p><p><strong>— Как ты нашёл работу мечты?</strong></p><p>На четвёртом курсе я отправил резюме в Яндекс на позицию Junior Data Engineer. Прошёл три собеседования: алгоритмы, SQL, поведенческие вопросы. Мне помогли пет-проекты — я выложил в открытый доступ парсер вакансий с hh.ru и дашборд аналитики. Сейчас я работаю в команде аналитики данных: строю ETL-процессы, оптимизирую запросы. Зарплата в 5 раз больше, чем у инженера на заводе. И главное — мне нравится решать логические задачи.</p><p><strong>— Что бы ты посоветовал нынешним школьникам?</strong></p><p>Не бойтесь ошибаться с выбором вуза и специальности. Это не на всю жизнь. Если на первом курсе поняли, что не ваше — меняйте, даже если придётся потерять год. Пробуйте разные профессии через стажировки, курсы, волонтёрство. И главное — развивайте «гибкие навыки»: английский язык, коммуникацию, умение искать информацию. Рынок труда меняется, и тот, кто умеет переучиваться, всегда будет на коне. Удачи!</p>" }
    };
    function getArticleId() { return new URLSearchParams(window.location.search).get('id'); }
    function renderArticle() {
        const id = getArticleId();
        const root = document.getElementById('articleRoot');
        if (!id || !articlesData[id]) {
            root.innerHTML = `<h1>Статья не найдена</h1><p>Перейдите на <a href="index.html">главную страницу</a> и выберите статью.</p><a href="index.html" class="back-link">Вернуться на главную</a>`;
            return;
        }
        const a = articlesData[id];
        root.innerHTML = `<h1 class="article-title">${a.title}</h1><div class="article-content">${a.content}</div><a href="index.html#articles" class="back-link">← Ко всем статьям</a>`;
    }
    renderArticle();
</script>
